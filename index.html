<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalizaBus — Ônibus ao vivo no DF</title>
    <meta name="description" content="Encontre os ônibus mais próximos de você em tempo real no Distrito Federal." />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <div class="header fade-in">
            <div class="logo">
                <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
                    fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="7" width="20" height="13" rx="2" ry="2"></rect>
                    <path d="M17 21h2a2 2 0 0 0 2-2v-2H3v2a2 2 0 0 0 2 2h2"></path>
                    <path d="M5 11h14"></path>
                    <path d="M11 7v4"></path>
                    <line x1="8" y1="21" x2="8" y2="21"></line>
                    <line x1="16" y1="21" x2="16" y2="21"></line>
                </svg>
                <h1 class="neon-text">LocalizaBus</h1>
            </div>
            <p class="subtitle">Encontre os ônibus mais próximos de você em tempo real no Distrito Federal.</p>
        </div>

        <div class="actions fade-in delay-1">
            <button id="btn-search" class="btn-primary neon-glow" onclick="handleSearch()">
                <svg class="btn-icon" id="btn-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M8 6v6"></path>
                    <path d="M15 6v6"></path>
                    <path d="M2 12h19.6"></path>
                    <path
                        d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3">
                    </path>
                    <circle cx="7" cy="18" r="2"></circle>
                    <path d="M9 18h5"></path>
                    <circle cx="16" cy="18" r="2"></circle>
                </svg>
                <span id="btn-text">Ver ônibus próximos</span>
                <div id="btn-spinner" class="spinner hidden"></div>
            </button>

            <button class="btn-secondary" onclick="window.open('https://t.me/SEU_BOT', '_blank')">
                <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                <span>Abrir no Telegram</span>
            </button>
        </div>

        <div id="status" class="status hidden"></div>

        <div id="results" class="results hidden">
            <h2 class="results-title">Ônibus próximos</h2>
            <div id="bus-list"></div>
        </div>

        <p class="footer fade-in delay-2">LocalizaBus — Transporte público do DF</p>
    </div>

    <script src="index.js"></script>
</body>

</html>
