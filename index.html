<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>LocalizaBus — Ônibus ao vivo no DF</title>
    <meta name="description" content="Encontre os ônibus mais próximos de você em tempo real no Distrito Federal.">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ══ Theme toggle bar ══ -->
    <div class="theme-bar">
        <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema" title="Alternar modo claro / escuro">
            <span class="theme-toggle-icon icon-sun" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
                </svg>
            </span>

            <span class="theme-toggle-icon icon-moon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </span>

            <span id="theme-label">Modo escuro</span>
        </button>
    </div>

    <div class="container">
        <div class="header fade-in">
            <div class="logo">
                <img id="logo-img" class="logo-img" src="img/white-removebg-preview.png" alt="Logo LocalizaBus">
                <h1 class="neon-text">LocalizaBus</h1>
            </div>
            <p class="subtitle">Planeje sua rota e acompanhe seu ônibus em tempo real.</p>
        </div>

        <div class="search-box fade-in delay-1">
            <div class="input-group">
                <label for="origin-input">Sua localização</label>
                <div class="input-wrapper">
                    <input type="text" id="origin-input" placeholder="Minha localização atual" autocomplete="off">
                    <button id="btn-use-gps" title="Usar GPS">📍</button>
                </div>
                <div id="origin-suggestions" class="suggestions-list hidden"></div>
            </div>

            <div class="input-group">
                <label for="destination-input">Para onde você vai?</label>
                <div class="input-wrapper">
                    <input type="text" id="destination-input" placeholder="Ex: Rodoviária do Plano Piloto" autocomplete="off">
                    <button id="btn-select-map" title="Escolher no mapa">🗺️</button>
                </div>
                <div id="destination-suggestions" class="suggestions-list hidden"></div>
            </div>

            <button id="btn-route-search" class="btn-primary neon-glow">
                <span>Traçar Rota</span>
                <div id="btn-spinner" class="spinner hidden"></div>
            </button>
        </div>

        <!-- Container do Mapa Principal -->
        <div id="main-map" class="map-container fade-in delay-2"></div>

        <div id="status" class="status hidden"></div>

        <div id="results" class="results hidden">
            <h2 class="results-title">Melhor opção</h2>
            <div id="route-details"></div>
        </div>

        <p class="footer fade-in delay-2">LocalizaBus — Transporte público do DF</p>
    </div>

    <!-- Modal para seleção no mapa -->
    <div id="map-modal" class="modal-overlay hidden">
        <div class="modal-card map-modal-card">
            <div class="modal-header">
                <h3>Escolher ponto no mapa</h3>
                <button id="map-modal-close">×</button>
            </div>
            <div id="picker-map"></div>
            <div class="modal-footer">
                <span id="map-selection-text">Clique no mapa para selecionar</span>
                <button id="btn-confirm-map" class="btn-primary" disabled>Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
