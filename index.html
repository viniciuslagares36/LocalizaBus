<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalizaBus — Ônibus ao vivo no DF</title>
    <meta name="description" content="Encontre os ônibus mais próximos de você em tempo real no Distrito Federal." />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ══ Theme toggle bar ══ -->
    <div class="theme-bar">
        <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema" title="Alternar modo claro / escuro">
            <span class="theme-toggle-icon icon-sun" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4" />
                    <path
                        d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
                </svg>
            </span>

            <span class="theme-toggle-icon icon-moon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </span>

            <span id="theme-label">Modo claro</span>
        </button>
    </div>

    <div class="container">
        <div class="header fade-in">
            <div class="logo">
                <img id="logo-img" class="logo-img" src="img/white-removebg-preview.png" alt="Logo LocalizaBus" />
                <h1 class="neon-text">LocalizaBus</h1>
            </div>
            <p class="subtitle">Encontre os ônibus mais próximos de você em tempo real no Distrito Federal.</p>
        </div>

        <div class="actions fade-in delay-1">
            <button id="btn-search" class="btn-primary neon-glow">
                <svg class="btn-icon" id="btn-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="5" width="18" height="13" rx="2" />
                    <rect x="5" y="8" width="4" height="3" rx="0.5" />
                    <rect x="10" y="8" width="4" height="3" rx="0.5" />
                    <rect x="15" y="8" width="3" height="3" rx="0.5" />
                    <line x1="3" y1="13" x2="21" y2="13" />
                    <line x1="12" y1="13" x2="12" y2="18" />
                    <path d="M3 18v1a1 1 0 0 0 1 1h1M19 18v1a1 1 0 0 1-1 1h-1" />
                    <circle cx="7" cy="20" r="1.5" />
                    <circle cx="17" cy="20" r="1.5" />
                </svg>
                <span id="btn-text">Ver ônibus próximos</span>
                <div id="btn-spinner" class="spinner hidden"></div>
            </button>

            <button class="btn-secondary" onclick="window.open('https://t.me/localizabus_bot', '_blank')">
                <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                <span>Abrir no Telegram</span>
            </button>
        </div>

        <div id="status" class="status hidden"></div>

        <div id="results" class="results hidden">
            <h2 class="results-title">Ônibus próximos</h2>
            <div id="bus-list"></div>
        </div>

        <p class="footer fade-in delay-2">LocalizaBus — Transporte público do DF</p>
    </div>

    <!-- ══════════════════════════════════════
         MODAL DE DESTINO
         ══════════════════════════════════════ -->
    <div id="destination-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button id="modal-close" class="modal-close" aria-label="Fechar">&times;</button>

            <h2 class="modal-title neon-text">Pra onde você quer ir?</h2>
            <p class="modal-subtitle">Digite o destino e escolha uma sugestão</p>

            <div class="modal-input-wrap">
                <input id="destination-input" class="modal-input" type="text"
                    placeholder="Ex: Rodoviária do Plano Piloto" autocomplete="off" />
            </div>

            <div id="suggestions-list" class="suggestions-list hidden"></div>

            <button id="btn-confirm-dest" class="btn-primary neon-glow modal-confirm">
                Confirmar destino
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
