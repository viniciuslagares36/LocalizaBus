<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>LocalizaBus — Ônibus ao vivo no DF</title>
    <meta name="description" content="Encontre os ônibus mais próximos de você em tempo real no Distrito Federal.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="data:,">
</head>

<body>
    <div class="theme-bar">
        <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">
            <span class="theme-toggle-icon icon-sun" id="sun-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path
                        d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41">
                    </path>
                </svg>
            </span>
            <span class="theme-toggle-icon icon-moon" id="moon-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </span>
            <span id="theme-label">Modo escuro</span>
        </button>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <img id="logo-img" class="logo-img" src="img/white-removebg-preview.png" alt="Logo LocalizaBus">
                <h1 class="neon-text">LocalizaBus</h1>
            </div>
            <p class="subtitle">Planeje sua rota e acompanhe seu ônibus em tempo real.</p>
        </div>

        <div id="initial-actions" class="actions-grid">
            <button id="btn-mode-nearby" class="btn-primary neon-glow">
                <span class="btn-icon-svg">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                </span>
                <span>Ônibus Próximos</span>
            </button>
            <button id="btn-mode-plan" class="btn-secondary">
                <span class="btn-icon-svg">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M16.2 7.8 12 12l-4.2 4.2" />
                        <path d="m12 12 4.2 4.2" />
                        <path d="m12 12-4.2-4.2" />
                    </svg>
                </span>
                <span>Planejar Rota</span>
            </button>
        </div>

        <div id="search-container" class="search-box hidden">
            <div class="search-header">
                <button id="btn-back-to-modes" class="btn-back">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                </button>
                <span id="search-title">Planejar Rota</span>
            </div>

            <div class="input-group" id="origin-group">
                <label for="origin-input">Sua localização</label>
                <div class="input-wrapper">
                    <input type="text" id="origin-input" placeholder="Minha localização atual" autocomplete="off">
                    <button id="btn-use-gps" class="input-btn" title="Usar GPS">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3" />
                            <path d="M12 2v3m0 14v3m10-10h-3M5 12H2" />
                        </svg>
                    </button>
                </div>
                <div id="origin-suggestions" class="suggestions-list hidden"></div>
            </div>

            <div class="input-group" id="destination-group">
                <label for="destination-input">Para onde você vai?</label>
                <div class="input-wrapper">
                    <input type="text" id="destination-input" placeholder="Ex: Rodoviária do Plano Piloto"
                        autocomplete="off">
                    <button id="btn-select-map" class="input-btn" title="Escolher no mapa">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6" />
                            <line x1="9" y1="3" x2="9" y2="18" />
                            <line x1="15" y1="6" x2="15" y2="21" />
                        </svg>
                    </button>
                </div>
                <div id="dest-suggestions" class="suggestions-list hidden"></div>
            </div>

            <button id="btn-route-search" class="btn-primary neon-glow">
                <span>Buscar</span>
                <div id="btn-spinner" class="spinner hidden"></div>
            </button>
        </div>

        <div id="main-map" class="map-container hidden"></div>

        <div id="status" class="status hidden"></div>

        <div id="results" class="results hidden">
            <h2 class="results-title" id="results-label">Melhores opções</h2>
            <div id="route-details"></div>
        </div>

        <p class="site-footer">LocalizaBus — Transporte público do DF</p>
    </div>

    <div id="map-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Escolher ponto no mapa</h3>
                <button id="map-modal-close">×</button>
            </div>
            <div id="picker-map"></div>
            <div class="modal-footer">
                <span id="map-selection-text">Clique no mapa para selecionar</span>
                <button id="btn-confirm-map" class="btn-primary" disabled>Confirmar</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="./script.js"></script>
</body>

</html>
